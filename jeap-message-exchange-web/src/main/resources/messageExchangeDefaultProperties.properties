spring.jpa.open-in-view=false
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/please-set-db-url
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.pool-name="hikari-cp-${spring.application.name}"
spring.flyway.enabled=true
# Use a session-level advisory lock for the schema history instead of a transaction-level one: Flyway's open
# locking transaction would otherwise deadlock with CREATE INDEX CONCURRENTLY migrations (e.g. V8), which wait
# for all open transactions
spring.flyway.postgresql.transactional-lock=false
springdoc.swagger-ui.urlsPrimaryName=MessageExchange-Service-Internal-API
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
server.tomcat.mbeanregistry.enabled=true
jeap.messageexchange.housekeeping.cron=0 30 2 * * *
jeap.messageexchange.housekeeping.batch-size=100
jeap.messageexchange.housekeeping.max-batches=100000
jeap.messageexchange.housekeeping.expiration-days=14
jeap.messageexchange.objectstorage.connection.region=${AWS_REGION:aws-global}
jeap.messageexchange.malwarescan.enabled=false
jeap.messageexchange.messagesent.enabled=false
