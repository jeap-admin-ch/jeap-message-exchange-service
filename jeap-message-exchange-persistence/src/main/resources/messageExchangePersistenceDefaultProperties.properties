# Use a session-level advisory lock for the schema history instead of a transaction-level one: Flyway's open
# locking transaction would otherwise deadlock with CREATE INDEX CONCURRENTLY migrations (e.g. V8), which wait
# for all open transactions. Defined in the persistence module so the property applies in every application
# context that runs the migrations shipped with this module.
spring.flyway.postgresql.transactional-lock=false
